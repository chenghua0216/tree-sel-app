<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEL 植．覺 - 自我覺察之旅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-teal: #2a9d8f;      /* 附圖深青 */
            --color-sage: #8ec3b0;      /* 附圖淺綠 */
            --color-yellow: #e9c46a;    /* 附圖黃色 */
            --color-beige: #f4f1de;     /* 附圖米色 */
            --brutal-black: #000000;
        }

        body {
            font-family: 'Noto Serif TC', serif;
            background-color: var(--color-beige);
            color: var(--brutal-black);
        }

        h1, .brutal-font {
            font-family: 'Noto Sans TC', sans-serif;
            font-weight: 900;
        }

        /* Neubrutalism 核心樣式 */
        .brutal-card {
            background-color: #ffffff;
            border: 4px solid var(--brutal-black);
            box-shadow: 8px 8px 0px 0px var(--brutal-black);
            border-radius: 1.5rem;
            transition: all 0.1s ease;
        }

        .brutal-btn {
            background-color: var(--color-yellow);
            color: var(--brutal-black);
            border: 4px solid var(--brutal-black);
            box-shadow: 6px 6px 0px 0px var(--brutal-black);
            font-family: 'Noto Sans TC', sans-serif;
            font-weight: 700;
            border-radius: 1rem;
        }

        .brutal-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px 0px var(--brutal-black);
        }

        .brutal-input {
            border: 4px solid var(--brutal-black) !important;
            border-radius: 1rem !important;
        }

        input[type="file"] {
            display: none;
        }

        textarea {
            resize: none;
        }

        /* 畫布樣式 */
        #polaroidCanvas {
            border: 4px solid var(--brutal-black);
            box-shadow: 12px 12px 0px 0px var(--brutal-black);
            border-radius: 4px;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex justify-center p-4">

    <div class="w-full max-w-md bg-[#FAF9F6] min-h-screen border-[6px] border-black rounded-[2.5rem] overflow-hidden relative pb-32 mb-10 shadow-2xl">
        
        <!-- Header: 使用深青色作為主背景 -->
        <header class="bg-[#2a9d8f] text-black p-8 border-b-[6px] border-black">
            <div class="flex flex-col items-center gap-2">
                <!-- SVG 使用米色強調 -->
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f4f1de" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
                <h1 class="text-4xl uppercase tracking-widest mt-2 text-white drop-shadow-[2px_2px_0px_rgba(0,0,0,1)]">植．覺</h1>
                <div class="h-1.5 w-16 bg-[#e9c46a] rounded-full"></div>
            </div>
        </header>

        <main class="p-6 space-y-8">
            
            <!-- 引導區塊: 使用深青色裝飾線 -->
            <div class="brutal-card p-6 bg-white">
                <div class="flex items-center gap-2 mb-3">
                    <span class="brutal-font text-xl underline decoration-4 decoration-[#e9c46a]">靜心引導</span>
                </div>
                <p class="text-base leading-relaxed text-stone-700">
                    緩緩深呼吸，觀察周遭的植物。它正以什麼樣的姿態與你共處？請捕捉它的身影，並與它進行一場內心的對話。
                </p>
            </div>

            <!-- 步驟說明與操作 -->
            <div class="space-y-8">
                <!-- 步驟 1 -->
                <div class="space-y-3">
                    <div class="flex items-center justify-between">
                        <label class="brutal-font text-xs uppercase bg-black text-white px-3 py-1 rounded-full">STEP 01</label>
                        <span class="brutal-font text-sm text-stone-500">捕捉綠意</span>
                    </div>
                    <label for="imageUpload" class="brutal-btn flex items-center justify-center gap-3 w-full p-6 cursor-pointer text-xl group">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                        <span id="uploadText">點擊開啟相機</span>
                    </label>
                    <input type="file" id="imageUpload" accept="image/*" capture="environment">
                </div>

                <!-- 步驟 2 -->
                <div class="space-y-3">
                    <div class="flex items-center justify-between">
                        <label class="brutal-font text-xs uppercase bg-black text-white px-3 py-1 rounded-full">STEP 02</label>
                        <span class="brutal-font text-sm text-stone-500">書寫心語</span>
                    </div>
                    <textarea id="reflectionText" rows="4" class="brutal-input w-full bg-white p-5 outline-none text-lg leading-relaxed placeholder:text-stone-300 focus:bg-[#8ec3b0]/10 transition-colors" placeholder="此時此刻，你想對它說什麼..."></textarea>
                </div>

                <!-- 成果預覽 -->
                <div class="space-y-6 pt-4 pb-10">
                    <div class="flex flex-col items-center gap-2">
                        <div class="flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-stone-400"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                            <label class="brutal-font text-sm uppercase text-stone-400">成果預覽</label>
                        </div>
                        <div class="flex justify-center w-full mt-4">
                            <canvas id="polaroidCanvas" class="w-full max-w-[280px] h-auto bg-white"></canvas>
                        </div>
                    </div>
                </div>
            </div>

        </main>

        <!-- 底部懸浮按鈕: 使用黑色背景營造強烈對比 -->
        <div class="fixed bottom-0 left-0 w-full flex flex-col items-center pb-8 pt-4 px-8 pointer-events-none">
            <button id="downloadBtn" class="w-full max-w-md brutal-btn bg-black text-white py-5 px-6 text-xl flex items-center justify-center gap-3 pointer-events-auto rounded-[1.5rem]">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#e9c46a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                儲存這份覺察
            </button>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const canvas = document.getElementById('polaroidCanvas');
            const ctx = canvas.getContext('2d');
            const imageUpload = document.getElementById('imageUpload');
            const reflectionText = document.getElementById('reflectionText');
            const downloadBtn = document.getElementById('downloadBtn');
            const uploadText = document.getElementById('uploadText');

            let uploadedImage = null;

            const CANVAS_WIDTH = 1080;
            const CANVAS_HEIGHT = 1350; 
            
            canvas.width = CANVAS_WIDTH;
            canvas.height = CANVAS_HEIGHT;

            document.fonts.ready.then(() => {
                renderCanvas();
            });

            imageUpload.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    uploadText.textContent = "更換植物照片";
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const img = new Image();
                        img.onload = function() {
                            uploadedImage = img;
                            renderCanvas();
                        }
                        img.src = event.target.result;
                    }
                    reader.readAsDataURL(file);
                }
            });

            reflectionText.addEventListener('input', renderCanvas);

            function wrapText(context, text, x, y, maxWidth, lineHeight) {
                const characters = Array.from(text);
                let line = '';
                let currentY = y;

                for (let n = 0; n < characters.length; n++) {
                    if (characters[n] === '\n') {
                        context.fillText(line, x, currentY);
                        line = '';
                        currentY += lineHeight;
                        continue;
                    }
                    let testLine = line + characters[n];
                    let metrics = context.measureText(testLine);
                    if (metrics.width > maxWidth && n > 0) {
                        context.fillText(line, x, currentY);
                        line = characters[n];
                        currentY += lineHeight;
                    } else {
                        line = testLine;
                    }
                }
                context.fillText(line, x, currentY);
            }

            function renderCanvas() {
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

                const padding = 70; 
                const bottomAreaHeight = 380; 
                const photoWidth = CANVAS_WIDTH - (padding * 2);
                const photoHeight = CANVAS_HEIGHT - padding - bottomAreaHeight;

                if (uploadedImage) {
                    const scale = Math.max(photoWidth / uploadedImage.width, photoHeight / uploadedImage.height);
                    const drawWidth = uploadedImage.width * scale;
                    const drawHeight = uploadedImage.height * scale;
                    const dx = padding + (photoWidth - drawWidth) / 2;
                    const dy = padding + (photoHeight - drawHeight) / 2;

                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(padding, padding, photoWidth, photoHeight);
                    ctx.clip();
                    ctx.drawImage(uploadedImage, dx, dy, drawWidth, drawHeight);
                    ctx.restore();
                } else {
                    ctx.fillStyle = '#f3f4f6'; 
                    ctx.fillRect(padding, padding, photoWidth, photoHeight);
                    ctx.fillStyle = '#000000';
                    ctx.font = 'bold 42px "Noto Sans TC", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('等待捕捉綠意...', CANVAS_WIDTH / 2, padding + photoHeight / 2);
                }

                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 12;
                ctx.strokeRect(padding, padding, photoWidth, photoHeight);

                let userText = reflectionText.value.trim() || "在此寫下覺察內容...";
                
                let fontSize = 48;
                let lineHeight = 72;
                const textLength = userText.length;
                if (textLength <= 15) { fontSize = 68; lineHeight = 98; }
                else if (textLength > 60) { fontSize = 36; lineHeight = 56; }

                ctx.fillStyle = '#000000'; 
                ctx.font = `600 ${fontSize}px "Noto Serif TC", serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';

                const textMaxWidth = CANVAS_WIDTH - (padding * 3.5);
                const textStartX = CANVAS_WIDTH / 2;
                const textStartY = padding + photoHeight + 85;

                wrapText(ctx, userText, textStartX, textStartY, textMaxWidth, lineHeight);
                
                // 裝飾性標記: 使用最新色票中的黃色
                ctx.fillStyle = '#e9c46a';
                ctx.beginPath();
                ctx.arc(CANVAS_WIDTH/2, CANVAS_HEIGHT - 65, 10, 0, Math.PI * 2);
                ctx.fill();
            }

            downloadBtn.addEventListener('click', async () => {
                try {
                    const fileName = `SEL_PlantSense_${Date.now()}.jpg`;
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.95));
                    const file = new File([blob], fileName, { type: 'image/jpeg' });

                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({ files: [file], title: '植．覺 自我覺察' });
                    } else {
                        const link = document.createElement('a');
                        link.download = fileName;
                        link.href = URL.createObjectURL(blob);
                        link.click();
                    }
                } catch (e) { console.error(e); }
            });
        });
    </script>
</body>
</html>
